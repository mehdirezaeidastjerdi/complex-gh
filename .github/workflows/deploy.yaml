env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  
name: Deploy MultiDocker
on:
  push:
    branches:
      - main # check your repo, your default branch might be master!

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Validate Docker Hub secrets
        run: |
          if [ -z "${{ secrets.DOCKER_USERNAME }}" ] || [ -z "${{ secrets.DOCKER_PASSWORD }}" ]; then
            echo "DOCKER_USERNAME or DOCKER_PASSWORD is not set."
            exit 1
          fi
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - run: docker build -t mehdirezaeidastjerdi/react-test -f ./client/Dockerfile.dev ./client
      - run: docker run -e CI=true mehdirezaeidastjerdi/react-test npm test

      - run: docker build -t mehdirezaeidastjerdi/multi-client ./client
      - run: docker build -t mehdirezaeidastjerdi/multi-nginx ./nginx
      - run: docker build -t mehdirezaeidastjerdi/multi-server ./server
      - run: docker build -t mehdirezaeidastjerdi/multi-worker ./worker

      - run: docker push mehdirezaeidastjerdi/multi-client
      - run: docker push mehdirezaeidastjerdi/multi-nginx
      - run: docker push mehdirezaeidastjerdi/multi-server
      - run: docker push mehdirezaeidastjerdi/multi-worker
